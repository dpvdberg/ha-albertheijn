language: nl
intents:
  AlbertHeijnSearchProducts:
    data:
      - sentences:
          - "zoek product code voor {query} bij albert heijn"
          - "welke {query} [producten] heeft albert heijn"
          - "welke product code heeft {query} [bij albert heijn]"
  AlbertHeijnAddToOrder:
    data:
      - sentences:
          - "voeg product code {product_id} toe [aan [mijn] bestelling]"
          - "voeg {quantity} van product code {product_id} toe [aan [mijn] bestelling]"
          - "bestel product code {product_id}"
          - "product code {product_id} toevoegen"
  AlbertHeijnListOrderItems:
    data:
      - sentences:
          - "wat zit er in [mijn] [albert heijn] bestelling"
          - "toon [mijn] bestelling"
          - "welke producten [zitten er] in [mijn] bestelling"
          - "laat [mijn] bestelling zien"
          - "wat heb ik besteld"
  AlbertHeijnRemoveFromOrder:
    data:
      - sentences:
          - "verwijder product code {product_id} uit [mijn] bestelling"
          - "haal product code {product_id} uit [mijn] bestelling"
          - "product code {product_id} verwijderen"
  AlbertHeijnOrderStatus:
    data:
      - sentences:
          - "[wat is] [de] status [van] [mijn] [albert heijn] bestelling"
          - "wanneer wordt [mijn] bestelling bezorgd"
          - "wanneer [komen|komt] de boodschappen [bezorging]"
          - "hoe staat het met [mijn] bestelling"
lists:
  query:
    wildcard: true
  product_id:
    wildcard: true
  quantity:
    range:
      from: 1
      to: 99

